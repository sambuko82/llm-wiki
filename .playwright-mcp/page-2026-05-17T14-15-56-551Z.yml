        - generic [ref=e447]:
          - heading "Travelling from Singapore, Malaysia, Hong Kong, or Taiwan?" [level=2] [ref=e448]
          - generic [ref=e449]:
            - generic [ref=e450]:
              - heading "From Singapore" [level=3] [ref=e451]
              - paragraph [ref=e452]: For travellers flying from Singapore, Surabaya is often the most practical gateway into East Java before continuing by private car to Bromo, Ijen, or Tumpak Sewu. This route suits visitors who want a clear airport-to-mountain transfer without piecing together trains, shared shuttles, or local taxis after arrival in Indonesia.
            - generic [ref=e453]:
              - heading "From Malaysia" [level=3] [ref=e454]
              - paragraph [ref=e455]: Travellers from Malaysia frequently use Surabaya as the easiest arrival point for East Java volcano trips, especially when they want direct onward ground support to Bromo and Ijen. A private Surabaya departure also helps guests who prefer fixed pick-up, simpler timing, and a single operator managing the overland part of the journey.
            - generic [ref=e456]:
              - heading "From Hong Kong" [level=3] [ref=e457]
              - paragraph [ref=e458]: If you are travelling from Hong Kong and looking for a smoother East Java entry point, Surabaya can work well for private volcano itineraries with structured arrival support. Many guests choose this option when they want to land, meet the driver, and continue directly toward Bromo or multi-day combinations without extra domestic coordination stress.
            - generic [ref=e459]:
              - heading "From Taiwan" [level=3] [ref=e460]
              - paragraph [ref=e461]: For travellers departing from Taiwan, Surabaya is a sensible base if the priority is reaching East Java efficiently and starting the land program with minimal friction. It works especially well for visitors booking private tours who value confirmed logistics, airport pick-up clarity, and a more controlled route into Bromo, Ijen, and nearby highlights.
