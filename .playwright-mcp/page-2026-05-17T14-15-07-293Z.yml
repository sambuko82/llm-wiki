              - heading "About This Trip" [level=2] [ref=e229]: About This Trip
              - generic [ref=e232]: "Private 3-day overland tour: Surabaya → Bromo sunrise → Madakaripura Waterfall → Ijen blue fire → Bali. All-inclusive. Tourist Police-led operator."
            - generic [ref=e233]:
              - heading "Quick Answers" [level=2] [ref=e234]: Quick Answers
              - generic [ref=e236]:
                - generic [ref=e237]:
                  - heading "What exactly is covered in the all-inclusive price?" [level=3] [ref=e238]
                  - paragraph [ref=e239]: "Every JVTO booking covers: private transport throughout, accommodation with breakfast, all park and crater entrance fees, a HPWKI-licensed guide, unlimited mineral water, and a JVTO travel T-shirt. Bromo packages additionally include the mandatory 4WD jeep for caldera access. Ijen packages include the professional gas mask required under BBKSDA SE.1658 regulations. There are no surprise \"local payments\" — every cost is itemised in your booking confirmation."
                  - link "See inclusions & exclusions →" [ref=e240] [cursor=pointer]:
                    - /url: /policy/booking-payment-cancellation
                - generic [ref=e241]:
                  - heading "Is JVTO a licensed Indonesian tour operator?" [level=3] [ref=e242]
                  - paragraph [ref=e243]: Yes. JVTO operates as PT Java Volcano Rendezvous, AHU-registered February 2023, with NIB 1102230032918 (KBLI 79121 / 79911 — Travel Agency / Tour Operator) and HPWKI Ijen guide-association membership. Every credential is verifiable on Indonesian government registries.
                  - link "Verify on /verify-jvto/legal →" [ref=e244] [cursor=pointer]:
                    - /url: /verify-jvto/legal
                - generic [ref=e245]:
                  - heading "Do you offer student discounts through ISIC?" [level=3] [ref=e246]
                  - paragraph [ref=e247]: "JVTO is a verified ISIC partner (Provider ID 259268). Valid ISIC cardholders receive a student rate on Ijen and Bromo tour packages. Show your ISIC card when booking; the student rate is confirmed in your booking summary before deposit. Verification: isic.org/discounts/?providerId=259268."
                  - link "See ISIC student packages →" [ref=e248] [cursor=pointer]:
                    - /url: /isic/student-package
                - generic [ref=e249]:
                  - heading "Who runs my tour?" [level=3] [ref=e250]
                  - paragraph [ref=e251]: JVTO is founded by Bripka Agung Sambuko (Mr. Sam) — an active Tourist Police officer (POLPAR) under Indonesia's Ditpamobvit, also serving as HPWKI Pengawas. On-trip guides are HPWKI-licensed (KTA card) with annual BBKSDA-supervised volcanic-safety training. No anonymous freelancers.
                  - link "See our team + KTA cards →" [ref=e252] [cursor=pointer]:
                    - /url: /why-jvto/our-team
                - generic [ref=e253]:
                  - heading "Is JVTO an eco-responsible operator?" [level=3] [ref=e254]
                  - paragraph [ref=e255]: JVTO holds Spotlight Network membership in INDECON (Indonesian Ecotourism Network), the national ecotourism advocacy body. All Ijen and Bromo operations follow BBKSDA Leave No Trace protocols; guides are HPWKI-certified in BBKSDA environmental compliance. No off-trail access, no wildlife interference, and responsible waste-management standards on every trip.
                  - generic [ref=e256]: "INDECON Spotlight: indecon.id/spotlight-networks/java-volcano-tour-operator"
                - generic [ref=e257]:
                  - heading "What is the Ijen health screening you mention?" [level=3] [ref=e258]
                  - paragraph [ref=e259]: BBKSDA Jawa Timur circular SE.1658/KSA.9/2024 requires Kawah Ijen visitors to present a clinic-issued certificate confirming blood pressure and SpO₂ are within safe limits before crater entry. JVTO coordinates the screening with Dr. Ahmad Irwandanu at Klinik Bakti Husada, Bondowoso — his licence is publicly verifiable on satusehat.kemkes.go.id.
                  - link "See health screening guide →" [ref=e260] [cursor=pointer]:
                    - /url: /travel-guide/ijen-health-screening
                - generic [ref=e261]:
                  - heading "What happens if I need to cancel?" [level=3] [ref=e262]
                  - paragraph [ref=e263]: Cancellations made ≥48 hours before Day 1 receive 100% Travel Credit — non-expiring, transferable to any traveler, denominated in IDR, with no rebooking fee. Within 48 hours, the deposit is forfeited. Force-majeure closures (e.g., volcanic alert) are handled under a separate weather-and-closures protocol with full Travel Credit protection.
                  - link "See cancellation policy →" [ref=e264] [cursor=pointer]:
                    - /url: /policy/booking-payment-cancellation
                - generic [ref=e265]:
                  - heading "What if the volcano closes on my trip date?" [level=3] [ref=e266]
                  - paragraph [ref=e267]: Volcanic alert level changes and BBKSDA closures are outside any operator's control. When a closure affects your confirmed dates, JVTO issues 100% Travel Credit with no rebooking fee — valid indefinitely, transferable. We monitor PVMBG alerts and notify guests proactively; our weather-and-closures policy documents the full SOP.
                  - link "See weather & closures policy →" [ref=e268] [cursor=pointer]:
                    - /url: /travel-guide/weather-and-closures
                - generic [ref=e269]:
                  - heading "What do past guests say about JVTO?" [level=3] [ref=e270]
                  - paragraph [ref=e271]: JVTO holds 4.8 ★ across 47+ verified reviews on Trustpilot, Google Maps, TripAdvisor, and Booking.com. Reviews consistently cite Mr. Sam's police-safety background, guide professionalism, and the all-inclusive no-hidden-cost model. All review profiles link to the original platform so you can verify authenticity.
                  - link "Read verified reviews →" [ref=e272] [cursor=pointer]:
                    - /url: /why-jvto/reviews
