              - generic [ref=e315]:
                - generic [ref=e316]:
                  - paragraph [ref=e317]: "\"Locals view Ijen as 'Gunung sing urip' — the living mountain. The Tenggerese and Osing communities consider the volcano sacred and make offerings during the Javanese month of Suro for protection and gratitude. The sulfur miners, known as 'Wong Ijen', have worked the volcano for generations, developing unique cultural practices around their dangerous profession. The volcano represents the element of Fire in Javanese cosmology - symbolizing power, creation, and purification.\""
