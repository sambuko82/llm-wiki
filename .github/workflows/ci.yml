name: CI

# Validates the SSOT compilers stay clean. No artifacts are written (dry-run only);
# this guards against committing a wiki state that the compilers would reject.
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Package Readiness compiler (strict)
        run: python scripts/compile_packages.py --dry-run --verbose --strict

      - name: Trust Bundle compiler (validate)
        run: python scripts/compile_trust.py --dry-run --verbose

      - name: Output index integrity
        run: python scripts/verify_output_index.py

      # Phase 1.9 — only after a merge to master AND the compilers above pass,
      # notify jvto-web to sync the freshly-validated artifacts. Token is read
      # from a secret and never printed.
      - name: Notify jvto-web (repository_dispatch)
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.JVTO_WEB_DISPATCH_TOKEN }}
        run: |
          gh api -X POST repos/jvto-devteam/jvto-web/dispatches \
            -f event_type=llm-wiki-master-updated \
            -f "client_payload[sha]=${GITHUB_SHA}"
