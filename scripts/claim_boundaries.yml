# Claim-boundary denylist + canonical values for scripts/verify_claims.py.
#
# Mirrors the locked SSOT — keep in sync when those change:
#   raw/_manifest/decision-registry.yml   DEC-001 (Stefan canonical: ISBN-13 9783770167654, no year/edition)
#   wiki/credentials/trust-signals.md     canonical review counts (Google 123, Trustpilot 51, ...)
#   CLAUDE.md                             identity (NIB, office No.102A, dates)
#
# The linter scans a TARGET (a draft, stdin, or named files) — NOT the canonical sources,
# which legitimately quote superseded/stale strings as historical/resolution notes.

# Governance / dispute records are never scanned for boundary violations (they record the
# superseded values on purpose).
exclude_globs:
  - "wiki/log.md"
  - "raw/_manifest/**"
  - "output/_archive/**"
  - "wiki/sources/*dossier*"
  - "wiki/sources/guardian-authority-framework*"
  - "plugins/**"
  - "scripts/**"

# A line containing any marker is treated as context/resolution (a note ABOUT a superseded
# value), not an active assertion, and is skipped.
context_markers:
  - "supersed"
  - "dropped"
  - "disputed"
  - "conf-"
  - "dec-"
  - "do not publish"
  - "do not use"
  - "[stale?]"
  - "contradiction"
  - "raw audit"
  - "no longer"
  - "not asserted"
  - "superseded-by"
  - "fixed to"
  - "was `"

# Deliberate, owner-locked exceptions (R2 decision: these Booking-evidence lines stay).
# An entry suppresses one rule on lines of one path that contain `text`.
allow:
  - {rule: BOOKING-CONTINUITY, path: "wiki/credentials/legal-licenses.md", text: "confirming operational continuity"}
  - {rule: BOOKING-CONTINUITY, path: "wiki/credentials/legal-licenses.md", text: "demonstrating continuous operational presence"}
  # The medical-screening Avoid column deliberately quotes the superseded conditional phrase.
  - {rule: MEDICAL-CONDITIONAL, path: "wiki/credentials/medical-screening.md", text: "implies optional"}

# Boundary rules — an affirmative match on an active line fails the content.
boundaries:
  - id: STEFAN-EDITION
    # Target the DROPPED metadata only. The dropped ISBN-13 (978-3-7701-7881-0) and the
    # canonical (978-3-770-16765-4) share the "9783770" prefix, so match the unique "7701-7881"
    # segment, never the bare "978-3-7701".
    pattern: "(?i)stefan.{0,80}?(4th edition|2016 edition|\\b2018\\b|dumont|7701[- ]?7881|9783770178810)"
    message: "Stefan Loose year/edition/publisher asserted (superseded by DEC-001 / CONF-001)."
    fix: "Use only: identifies 'Agung' re Ijen Bondowoso Homestay; ISBN-13 9783770167654, p. 287. No year/edition/publisher."
  - id: BOOKING-CONTINUITY
    pattern: "(?i)(same address where jvto operates|confirming operational continuity|demonstrating continuous operational presence|address[- ]continuity evidence|'a' suffix was added after|suffix was added after the pt)"
    message: "Booking framed as address continuity / legal succession."
    fix: "Booking is historical address context only (No.102 homestay / No.102A office, same street); not continuity or legal succession."
  - id: DETIK-IJEN
    pattern: "(?i)detik.{0,45}?(at ijen|kawah ijen|patrolling the ijen|duties at ijen|officer at ijen)"
    message: "Detik attributed to Kawah-Ijen-specific duty (Detik is general Bondowoso duty)."
    fix: "Detik -> 'Bondowoso area'. (Collective lines grouping Detik with BBKSDA/Radar, which are genuinely Ijen, are fine.)"
  - id: BBKSDA-CERTIFIED
    pattern: "(?i)bbksda[- ]?certified"
    message: "Over-claim: 'BBKSDA certified'."
    fix: "BBKSDA supervises HPWKI guide training; never 'BBKSDA certified JVTO'."
  # MEDICAL-UNIVERSAL (banned "no valid QR = no access" / "mandatory and non-negotiable" as a
  # universal-JVTO-rule over-claim) removed 2026-07-06: the owner adjudication that day flipped
  # Ijen health screening to MANDATORY for every guest (BBKSDA SE.1658/KSA.9/2024 cited as
  # supporting evidence, not a conditional trigger), superseding the 2026-07-05 conditional
  # decision — see wiki/ops/policy-source-ownership.md and wiki/credentials/medical-screening.md.
  # The rule was banning exactly the wording now required. Mirrors the equivalent fix in
  # jvto-web (commit d3b4d11, scripts/validate-content-drift.mjs).
  - id: MEDICAL-CONDITIONAL
    # Inverse guard added 2026-07-07 after the C4 reconciliation sweep: the superseded
    # threshold-conditional screening framing must not re-enter content. Screening is
    # mandatory for every guest (adjudicated 2026-07-06).
    pattern: "(?i)(access rules can require|when (?:current )?access rules require|when crater conditions meet|when bbksda rules (?:apply|require)|where bbksda rules require|screening[^\\n.]{0,50}\\((?:when|where) required\\)|coordination \\((?:when|where) required\\))"
    message: "Threshold-conditional Ijen screening framing (superseded 2026-07-06; screening is mandatory for every guest)."
    fix: "Use medical-screening.md approved language: 'A health certificate is mandatory for every guest before Kawah Ijen crater entry, per BBKSDA SE.1658/KSA.9/2024.'"
  - id: ISIC-PARTNER
    pattern: "(?i)isic.{0,40}?(official provider listing|as a partner|is a partner)"
    message: "ISIC asserted as partner / official provider listing without direct provider evidence."
    fix: "Gate ISIC until the provider page directly identifies JVTO."

# Stale review counts — a count that must never appear within ~40 chars of its platform name.
stale_review_claims:
  - {platform: google, count: "92"}
  - {platform: trustpilot, count: "47"}

# Canonical values (documentation for source-backing; the active numeric check is the stale
# list above).
canonical:
  google_reviews: "123"
  trustpilot_reviews: "51"
  tripadvisor_reviews: "21"
  total_reviews: "195"
  nib: "1102230032918"
  office: "No.102A"
  stefan_isbn13: "9783770167654"
  stefan_page: "287"
